<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Daniëlle Scheurkogel</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .thank-you-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            padding: var(--spacing-md);
        }
        
        .thank-you-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            max-width: 600px;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        
        .thank-you-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto var(--spacing-md);
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease 0.3s both;
        }
        
        .thank-you-icon svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 3;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .thank-you-title {
            margin-bottom: var(--spacing-sm);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .thank-you-message {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-md);
            font-size: 1.1rem;
        }
        
        .countdown {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <div class="thank-you-container">
        <div class="thank-you-card">
            <div class="thank-you-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h1 class="thank-you-title">Message Sent Successfully!</h1>
            
            <p class="thank-you-message">
                Thank you for reaching out! I've received your message and will get back to you as soon as possible.
                Whether it's about a project opportunity or a metal band recommendation, I'm looking forward to our conversation!
            </p>
            
            <a href="index.html" class="btn btn-primary">
                <svg style="width: 20px; height: 20px; stroke-width: 2;" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                <span>Back to Portfolio</span>
            </a>
            
            <p class="countdown">Redirecting in <span id="countdown">10</span> seconds...</p>
        </div>
    </div>
    
    <script>
        // Auto-redirect after 10 seconds
        let seconds = 10;
        const countdownElement = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
